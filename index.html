<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meat Pro: Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --red: #c0392b; --red-light: #e74c3c;
            --green: #27ae60; --green-light: #2ecc71;
            --blue: #2980b9; --dark: #1a1a2e; --dark2: #16213e;
            --gray: #f0f2f5; --border: #e0e0e0;
            --text: #2c2c2c; --text-muted: #888; --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: #1a1a2e;
            background-image: radial-gradient(circle at 20% 20%, rgba(192,57,43,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(39,174,96,0.08) 0%, transparent 50%);
            margin: 0; padding: 0; min-height: 100vh;
        }
        /* HEADER - НЕ ЗАКРІПЛЕНИЙ */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #2c1810 100%);
            padding: 25px 20px 20px; text-align: center;
            border-bottom: 3px solid var(--red);
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }
        .header h1 {
            font-family: 'Oswald', sans-serif; font-size: 26px;
            font-weight: 700; color: #fff; margin: 0 0 4px;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .header h1 span { color: var(--red-light); }
        #status { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; display: inline-block; margin: 8px 0; }
        .status-ok { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .status-err { background: rgba(231,76,60,0.15); color: #ff6b6b; border: 1px solid rgba(231,76,60,0.3); }
        .btn-main-add {
            background: linear-gradient(135deg, var(--red), var(--red-light));
            color: white; border: none; padding: 14px 35px; border-radius: 50px;
            font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600;
            letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(192,57,43,0.4); margin-top: 5px;
        }
        #cards-list { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 900px; margin: 20px auto; padding: 0 15px 30px; }
        @media (min-width: 680px) { #cards-list { grid-template-columns: repeat(2, 1fr); } }
        .card { background: white; border-radius: var(--radius); border: 2px solid var(--red-light); overflow: hidden; }
        .card.is-ok, .card.is-sent { border-color: var(--green); }
        .mini-content { display: none; padding: 14px 16px; align-items: center; gap: 12px; }
        .card.is-sent .full-content { display: none; }
        .card.is-sent .mini-content { display: flex; }
        .mini-indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--green-light); box-shadow: 0 0 0 3px rgba(46,204,113,0.2); }
        .mini-info { flex: 1; }
        .mini-weight { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--dark); }
        .mini-badge { background: var(--green); color: white; border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 700; }
        .full-content { padding: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-top: 10px; }
        input { width: 100%; height: 44px; border-radius: 10px; border: 1.5px solid var(--border); padding: 0 12px; font-size: 15px; background: var(--gray); margin-top: 5px; }
        .balance-box { padding: 12px; border-radius: 12px; text-align: center; margin: 14px 0; font-family: 'Oswald', sans-serif; font-size: 18px; border: 2px dashed; }
        .balance-err { background: #fff5f5; border-color: #ffcccc; color: var(--red); }
        .balance-ok { background: #f0fff4; border-color: var(--green-light); color: var(--green); }
        .sum-container { background: var(--gray); border-radius: 12px; padding: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .add-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn-plus { width: 54px; height: 42px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-send { flex: 1; background: var(--dark); color: white; border: none; padding: 15px; border-radius: 12px; font-family: 'Oswald', sans-serif; font-weight: 600; cursor: pointer; }
        .btn-delete-full, .mini-delete { background: #fff0f0; border: 1.5px solid #ffcccc; color: var(--red); border-radius: 12px; width: 50px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 340px; text-align: center; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: white; padding: 12px 24px; border-radius: 30px; z-index: 9999; transition: transform 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="header">
    <h1>MEAT <span>PRO</span> 🥩</h1>
    <div id="status">Підключення...</div>
    <br>
    <button class="btn-main-add" onclick="addNewBatch()">+ НОВА ПАРТІЯ</button>
</div>

<div id="cards-list"></div>
<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>🔐 ВИДАЛЕННЯ</h3>
        <p>Введіть пароль адміністратора</p>
        <input type="password" id="modalPassInput" maxlength="10" placeholder="••••">
        <div id="modalErr" style="color:red; font-size:12px; margin:10px 0;"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">СКАСУВАТИ</button>
            <button onclick="confirmDelete()" style="flex:1; padding:10px; border-radius:10px; background:var(--red); color:white; border:none;">ВИДАЛИТИ</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h3>🗑 ВИДАЛИТИ?</h3>
        <p>Цю партію буде видалено назавжди</p>
        <div style="display:flex; gap:10px;">
            <button onclick="closeConfirmModal()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">СКАСУВАТИ</button>
            <button onclick="doQuickDelete()" style="flex:1; padding:10px; border-radius:10px; background:var(--red); color:white; border:none;">ВИДАЛИТИ</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// НАЛАШТУВАННЯ (ВСТАВТЕ ВАШІ ДАНІ ТУТ)
// ==========================================
const firebaseConfig = {
        apiKey: "AIzaSyC8iJyz9URNWxqHoWl6fTAu89caaZK9l-U",
        authDomain: "meatapp-1.firebaseapp.com",
        databaseURL: "https://meatapp-1-default-rtdb.firebaseio.com",
        projectId: "meatapp-1",
        storageBucket: "meatapp-1.firebasestorage.app",
        messagingSenderId: "909786568400",
        appId: "1:909786568400:web:2a89c6b6eb5d17ff2930d5"
    };

    const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38";
const TG_CHAT_ID = "-1002336484919";
const TG_THREAD_ID = "4476";
const _AP = atob("MzE5Ng=="); // Пароль: 3196

let cachedData = {};
let pendingDeleteId = null;
let pendingQuickDeleteId = null;

function setStatus(msg, ok) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = ok ? 'status-ok' : 'status-err';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Функція очищення архіву (7 днів)
function cleanupOldBatches(data) {
    const now = Date.now();
    const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
    Object.values(data).forEach(item => {
        if (item.sent && (now - item.id > sevenDaysMs)) {
            firebase.database().ref('meat_batches/' + item.id).remove();
        }
    });
}

if (firebaseConfig.apiKey.includes("ВСТАВТЕ")) {
    setStatus("⚠️ Налаштуйте Firebase", false);
} else {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('meat_batches').on('value', snap => {
        cachedData = snap.val() || {};
        cleanupOldBatches(cachedData);
        renderCards(cachedData);
        setStatus("З'єднано з хмарою ✅", true);
    }, err => setStatus("Помилка БД: " + err.message, false));

    window.addNewBatch = () => {
        const id = Date.now();
        db.ref('meat_batches/' + id).set({
            id, date: new Date().toLocaleDateString('uk-UA'),
            name: "", weight_in: 0, pf: 0, mince: 0, waste: 0, sent: false
        }).then(() => showToast("Нова партія створена"));
    };

    window.updateField = (id, field, value) => {
        if (field !== 'name') value = value.toString().replace(',', '.');
        const val = field === 'name' ? value : (parseFloat(value) || 0);
        db.ref('meat_batches/' + id).update({ [field]: val });
    };

    window.addWeight = (id, field) => {
        const input = document.getElementById(`in-${field}-${id}`);
        if (!input) return;
        let valStr = input.value.replace(',', '.');
        const val = parseFloat(valStr);
        if (!val || val <= 0) { input.focus(); return; }

        db.ref('meat_batches/' + id + '/' + field).transaction(cur => {
            return Math.round(((cur || 0) + val) * 1000) / 1000;
        });
        input.value = '';
        input.focus();
    };

    window.sendToTG = async (id, btn) => {
        const item = cachedData[id];
        if (!item) return;
        btn.disabled = true;
        btn.textContent = "Надсилання...";
        
        const bal = Math.round((item.weight_in - (item.pf + item.mince + item.waste)) * 1000) / 1000;
        const text = `📦 АКТ РОЗБОРУ: ${item.name || '—'}\n📥 Прихід: ${item.weight_in} кг\n🔪 ПФ: ${item.pf} кг\n🍔 Фарш: ${item.mince} кг\n🗑 Відхід: ${item.waste} кг\n✅ Баланс: ${bal} кг`;
        
        try {
            const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text, message_thread_id: TG_THREAD_ID })
            });
            if (res.ok) {
                db.ref('meat_batches/' + id).update({ sent: true });
                showToast("Відправлено в TG ✅");
            } else { throw new Error(); }
        } catch (e) {
            showToast("Помилка відправки");
            btn.disabled = false;
            btn.textContent = "ВІДПРАВИТИ";
        }
    };
}

function renderCards(data) {
    if (document.querySelector('.modal-overlay.open')) return;
    const list = document.getElementById('cards-list');
    const items = Object.values(data).sort((a, b) => b.id - a.id);
    
    if (items.length === 0) {
        list.innerHTML = `<div style="color:white; text-align:center; padding:50px; grid-column:1/-1;">Натисніть "+ НОВА ПАРТІЯ"</div>`;
        return;
    }

    let html = '';
    items.forEach(item => {
        const balance = Math.round((item.weight_in - (item.pf + item.mince + item.waste)) * 1000) / 1000;
        const isOk = item.weight_in > 0 && balance === 0;
        
        if (item.sent) {
            html += `
            <div class="card is-sent">
                <div class="mini-content" style="display:flex">
                    <div class="mini-indicator"></div>
                    <div class="mini-info">
                        <div style="font-size:11px; color:#888">${item.name || 'Без назви'} · ${item.date}</div>
                        <div class="mini-weight">${item.weight_in} кг</div>
                    </div>
                    <div class="mini-badge">ВІДПРАВЛЕНО</div>
                    <button class="mini-delete" onclick="askDeletePassword('${item.id}')">🗑</button>
                </div>
            </div>`;
        } else {
            html += `
            <div class="card ${isOk ? 'is-ok' : ''}">
                <div class="full-content">
                    <div style="font-size:11px; color:#888; margin-bottom:8px;">📅 ${item.date}</div>
                    <label>Назва партії</label>
                    <input type="text" value="${item.name}" onchange="updateField('${item.id}','name',this.value)">
                    <label>Прихід (кг)</label>
                    <input type="number" step="0.001" value="${item.weight_in}" onchange="updateField('${item.id}','weight_in',this.value)">
                    <div class="balance-box ${isOk ? 'balance-ok' : 'balance-err'}">ЗАЛИШОК: ${balance.toFixed(3)} кг</div>
                    ${renderRow(item.id, '🔪 ПФ', 'pf', item.pf)}
                    ${renderRow(item.id, '🍔 Фарш', 'mince', item.mince)}
                    ${renderRow(item.id, '🗑 Відхід', 'waste', item.waste)}
                    <div class="card-actions">
                        <button class="btn-send" onclick="sendToTG('${item.id}', this)">ВІДПРАВИТИ В TG</button>
                        <button class="btn-delete-full" onclick="quickDelete('${item.id}')">🗑</button>
                    </div>
                </div>
            </div>`;
        }
    });
    list.innerHTML = html;
}

function renderRow(id, label, field, total) {
    return `<div class="sum-container">
        <div style="font-size:14px;">${label}: <b>${total} кг</b></div>
        <div class="add-row">
            <input type="number" step="0.001" id="in-${field}-${id}" placeholder="+ кг" onkeydown="if(event.key==='Enter') addWeight('${id}','${field}')">
            <button class="btn-plus" onclick="addWeight('${id}','${field}')">+</button>
        </div>
    </div>`;
}

window.askDeletePassword = (id) => { pendingDeleteId = id; document.getElementById('deleteModal').classList.add('open'); };
window.closeModal = () => { document.getElementById('deleteModal').classList.remove('open'); renderCards(cachedData); };
window.confirmDelete = () => {
    const inp = document.getElementById('modalPassInput');
    if (inp.value === _AP) {
        firebase.database().ref('meat_batches/' + pendingDeleteId).remove();
        inp.value = ''; closeModal();
    } else { alert("Невірний пароль"); inp.value = ''; }
};
window.quickDelete = (id) => { pendingQuickDeleteId = id; document.getElementById('confirmModal').classList.add('open'); };
window.closeConfirmModal = () => { document.getElementById('confirmModal').classList.remove('open'); renderCards(cachedData); };
window.doQuickDelete = () => { firebase.database().ref('meat_batches/' + pendingQuickDeleteId).remove(); closeConfirmModal(); };
</script>
</body>
</html>
