<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meat TSB: Multi-Type Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --red: #c0392b; --red-light: #e74c3c;
            --green: #27ae60; --green-light: #2ecc71;
            --blue: #2980b9; --dark: #1a1a2e; --dark2: #16213e;
            --gray: #f0f2f5; --border: #e0e0e0;
            --text: #2c2c2c; --text-muted: #888; --radius: 16px;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: #1a1a2e;
            background-image: radial-gradient(circle at 20% 20%, rgba(192,57,43,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(39,174,96,0.08) 0%, transparent 50%);
            margin: 0; padding: 0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #2c1810 100%);
            padding: 25px 20px 20px; text-align: center; border-bottom: 3px solid var(--red);
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }
        .header h1 { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; color: #fff; margin: 0; text-transform: uppercase; }
        .header span { color: var(--red-light); }
        #status { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; display: inline-block; margin: 8px 0; }
        .status-ok { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .status-err { background: rgba(231,76,60,0.15); color: #ff6b6b; border: 1px solid rgba(231,76,60,0.3); }
        
        .type-selector { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .btn-type-add {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px; border-radius: 12px; font-family: 'Oswald', sans-serif; cursor: pointer; transition: 0.2s;
        }
        .btn-type-add:hover { background: var(--red); border-color: var(--red); }

        #cards-list { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 900px; margin: 20px auto; padding: 0 15px 30px; }
        @media (min-width: 680px) { #cards-list { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: white; border-radius: var(--radius); border: 2px solid var(--red-light); overflow: hidden; position: relative; transition: transform 0.2s; }
        .card.is-ok, .card.is-sent { border-color: var(--green); }
        .card-type-label { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 700; background: var(--gray); padding: 2px 8px; border-radius: 10px; color: var(--text-muted); text-transform: uppercase; }
        
        .mini-content { display: none; padding: 14px 16px; align-items: center; gap: 12px; }
        .card.is-sent .full-content { display: none; }
        .card.is-sent .mini-content { display: flex; }
        .mini-indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--green-light); }
        .mini-weight { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; }
        
        .full-content { padding: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-top: 12px; margin-bottom: 2px; }
        input, select { width: 100%; height: 44px; border-radius: 10px; border: 1.5px solid var(--border); padding: 0 12px; font-size: 15px; background: var(--gray); margin-top: 5px; }
        
        input[type="date"] { font-family: 'Source Sans 3', sans-serif; color: var(--text); cursor: pointer; }

        .balance-box { padding: 12px; border-radius: 12px; text-align: center; margin: 14px 0; font-family: 'Oswald', sans-serif; font-size: 18px; border: 2px dashed; }
        .balance-err { background: #fff5f5; border-color: #ffcccc; color: var(--red); }
        .balance-ok { background: #f0fff4; border-color: var(--green-light); color: var(--green); }
        
        .sum-container { background: var(--gray); border-radius: 12px; padding: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .add-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn-plus { width: 54px; height: 42px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; }
        .card-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-send { flex: 1; background: var(--dark); color: white; border: none; padding: 15px; border-radius: 12px; font-family: 'Oswald', sans-serif; font-weight: 600; cursor: pointer; }
        .btn-delete-full, .mini-delete { background: #fff0f0; border: 1.5px solid #ffcccc; color: var(--red); border-radius: 12px; width: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 340px; text-align: center; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: white; padding: 12px 24px; border-radius: 30px; z-index: 9999; transition: transform 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* AUTH SCREEN UPDATED */
        #auth-screen {
            position: fixed; inset: 0;
            background: #1a1a2e;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px;
        }
        .auth-emoji { font-size: 48px; margin-bottom: 10px; }
        .auth-title { font-family: 'Oswald', sans-serif; font-size: 24px; color: #fff; margin-bottom: 20px; }
        .pin-display {
            display: flex; gap: 15px; margin-bottom: 30px;
        }
        .pin-dot {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3); transition: 0.2s;
        }
        .pin-dot.active { background: var(--red-light); border-color: var(--red-light); box-shadow: 0 0 15px var(--red-light); }
        
        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 100%; max-width: 280px;
        }
        .num-btn {
            aspect-ratio: 1; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white;
            font-family: 'Oswald', sans-serif; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .num-btn:active { background: var(--red); transform: scale(0.9); }
        #auth-error { color: #ff6b6b; font-size: 14px; margin-top: 20px; min-height: 20px; opacity: 0; }
        #auth-error.show { opacity: 1; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-emoji">🥩</div>
    <div class="auth-title">MEAT <span>TSB</span></div>
    
    <div class="pin-display" id="pin-display">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
    </div>

    <div class="numpad">
        <div class="num-btn" onclick="pressNum('1')">1</div>
        <div class="num-btn" onclick="pressNum('2')">2</div>
        <div class="num-btn" onclick="pressNum('3')">3</div>
        <div class="num-btn" onclick="pressNum('4')">4</div>
        <div class="num-btn" onclick="pressNum('5')">5</div>
        <div class="num-btn" onclick="pressNum('6')">6</div>
        <div class="num-btn" onclick="pressNum('7')">7</div>
        <div class="num-btn" onclick="pressNum('8')">8</div>
        <div class="num-btn" onclick="pressNum('9')">9</div>
        <div></div>
        <div class="num-btn" onclick="pressNum('0')">0</div>
        <div class="num-btn" onclick="pressNum('back')">←</div>
    </div>
    
    <div id="auth-error">Невірний PIN!</div>
</div>

<div id="app-content" style="display:none;">

<div class="header">
    <h1>MEAT <span>TSB</span> 🥩</h1>
    <div id="status">Підключення...</div>
   <div class="type-selector">
    <button class="btn-type-add" onclick="addNewBatch('meat')">+ М'ЯСО</button>
    <button class="btn-type-add" onclick="addNewBatch('lamb')">+ БАРАНИНА</button>
    <button class="btn-type-add" onclick="addNewBatch('salmon')">+ ЛОСОСЬ</button>
    <button class="btn-type-add" onclick="addNewBatch('ribs')">+ РЕБРА</button>
    <button class="btn-type-add" onclick="addNewBatch('mackerel')">+ СКУМБРІЯ</button>
</div>
</div>

<div id="cards-list"></div>
<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>🔐 ВИДАЛЕННЯ</h3>
        <p>Введіть пароль адміністратора</p>
        <input type="password" id="modalPassInput" inputmode="numeric" maxlength="10" placeholder="••••">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">СКАСУВАТИ</button>
            <button onclick="confirmDelete()" style="flex:1; padding:10px; border-radius:10px; background:var(--red); color:white; border:none;">ВИДАЛИТИ</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h3>🗑 ВИДАЛИТИ?</h3>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeConfirmModal()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">СКАСУВАТИ</button>
            <button onclick="doQuickDelete()" style="flex:1; padding:10px; border-radius:10px; background:var(--red); color:white; border:none;">ВИДАЛИТИ</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC8iJyz9URNWxqHoWl6fTAu89caaZK9l-U",
    authDomain: "meatapp-1.firebaseapp.com",
    databaseURL: "https://meatapp-1-default-rtdb.firebaseio.com",
    projectId: "meatapp-1",
    storageBucket: "meatapp-1.firebasestorage.app",
    messagingSenderId: "909786568400",
    appId: "1:909786568400:web:2a89c6b6eb5d17ff2930d5"
};

const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38";
const TG_CHAT_ID = "-1002336484919";
const TG_THREAD_ID = "4476";
const _AP = atob("MzE5Ng=="); // 3196

let cachedData = {};
let pendingDeleteId = null;
let pendingQuickDeleteId = null;

function setStatus(msg, ok) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = ok ? 'status-ok' : 'status-err';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

const TYPE_CONFIG = {
    meat: { label: "М'ясо", fields: [{k:'pf', l:'🔪 ПФ'}, {k:'mince', l:'🍔 Фарш'}, {k:'waste', l:'🗑 Відхід'}], hasBalance: true },
    lamb: { label: "Баранина", fields: [{k:'fillet', l:'🥩 Розбір'}, {k:'waste', l:'🗑 Кістки та жир'}], hasBalance: true },
    salmon: { label: "Лосось", fields: [{k:'shashlik', l:'🍢 Шашлик'}, {k:'razbor', l:'🐟 Розбір'}, {k:'bones', l:'🦴 Кістки'}], hasBalance: true },
    ribs: { label: "Ребра", fields: [{k:'count', l:'🔢 К-сть (шт)'}, {k:'weight', l:'⚖️ Ребра штат (вага)'}], hasBalance: false },
    mackerel: { label: "Скумбрія", fields: [{k:'count', l:'🔢 К-сть (шт)'}], hasBalance: false }
};

function getTodayISO() { return new Date().toISOString().split('T')[0]; }
function formatToUA(isoDate) {
    if (!isoDate) return "—";
    const [y, m, d] = isoDate.split('-');
    return `${d}.${m}.${y}`;
}

if (!firebaseConfig.apiKey.includes("ВСТАВТЕ")) {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('meat_batches').on('value', snap => {
        cachedData = snap.val() || {};
        renderCards(cachedData);
        setStatus("З'єднано з хмарою ✅", true);
    });

    window.addNewBatch = (type = 'meat') => {
        const id = Date.now();
        const initialData = { id, type, date: getTodayISO(), name: "", weight_in: 0, sent: false };
        TYPE_CONFIG[type].fields.forEach(f => initialData[f.k] = 0);
        db.ref('meat_batches/' + id).set(initialData).then(() => showToast(`Додано: ${TYPE_CONFIG[type].label}`));
    };

    window.updateField = (id, field, value) => {
        if (field !== 'name' && field !== 'date') value = value.toString().replace(',', '.');
        const val = (field === 'name' || field === 'date') ? value : (parseFloat(value) || 0);
        db.ref('meat_batches/' + id).update({ [field]: val });
    };

    window.addWeight = (id, field) => {
        const input = document.getElementById(`in-${field}-${id}`);
        let val = parseFloat(input.value.replace(',', '.'));
        if (!val || val <= 0) return;
        db.ref('meat_batches/' + id + '/' + field).transaction(cur => Math.round(((cur || 0) + val) * 1000) / 1000);
        input.value = '';
    };

    window.sendToTG = async (id, btn) => {
        const item = cachedData[id];
        const config = TYPE_CONFIG[item.type || 'meat'];
        btn.disabled = true;
        let text = `📦 Акт розбору (${config.label}): ${item.name || '—'}\n📅 Дата: ${formatToUA(item.date)}\n`;
        if (item.weight_in > 0) text += `📥 Прихід: ${item.weight_in} кг\n`;
        config.fields.forEach(f => { text += `${f.l}: ${item[f.k] || 0}\n`; });
        if (config.hasBalance) {
            const sumUsed = config.fields.reduce((acc, f) => acc + (item[f.k] || 0), 0);
            text += `✅ Баланс: ${Math.round((item.weight_in - sumUsed) * 1000) / 1000} кг`;
        }
        const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_CHAT_ID, text, message_thread_id: TG_THREAD_ID })
        });
        if (res.ok) { db.ref('meat_batches/' + id).update({ sent: true }); showToast("Відправлено!"); }
        else { btn.disabled = false; showToast("Помилка TG"); }
    };
}

function renderCards(data) {
    if (document.querySelector('.modal-overlay.open')) return;
    const list = document.getElementById('cards-list');
    const items = Object.values(data).sort((a, b) => b.id - a.id);
    list.innerHTML = items.map(item => {
        const type = item.type || 'meat';
        const config = TYPE_CONFIG[type];
        const sumUsed = config.fields.reduce((acc, f) => acc + (item[f.k] || 0), 0);
        const balance = Math.round((item.weight_in - sumUsed) * 1000) / 1000;
        const isOk = item.weight_in > 0 && balance === 0;
        return `
            <div class="card ${item.sent ? 'is-sent' : (config.hasBalance && isOk ? 'is-ok' : '')}">
                <div class="card-type-label">${config.label}</div>
                <div class="mini-content">
                    <div class="mini-indicator"></div>
                    <div class="mini-info">
                        <div style="font-size:11px; color:#888">${item.name || '...'} · ${formatToUA(item.date)}</div>
                        <div class="mini-weight">${item.weight_in || sumUsed} ${type === 'mackerel' ? 'шт' : 'кг'}</div>
                    </div>
                    <div class="mini-badge">ВІДПРАВЛЕНО</div>
                    <button class="mini-delete" onclick="askDeletePassword('${item.id}')">🗑</button>
                </div>
                <div class="full-content">
                    <label>Дата приходу</label>
                    <input type="date" value="${item.date || getTodayISO()}" onchange="updateField('${item.id}','date',this.value)">
                    <label>Назва / Коментар</label>
                    <input type="text" value="${item.name}" placeholder="Напр: Стегно куряче" onchange="updateField('${item.id}','name',this.value)">
                    ${type !== 'mackerel' && type !== 'ribs' ? `
                        <label>Прихід (кг)</label>
                        <input type="number" inputmode="decimal" step="0.001" value="${item.weight_in}" onchange="updateField('${item.id}','weight_in',this.value)">
                    ` : ''}
                    ${config.hasBalance ? `<div class="balance-box ${isOk ? 'balance-ok' : 'balance-err'}">ЗАЛИШОК: ${balance.toFixed(3)} кг</div>` : ''}
                    ${config.fields.map(f => `
                        <div class="sum-container">
                            <div style="font-size:14px;">${f.l}: <b>${item[f.k] || 0}</b></div>
                            <div class="add-row">
                                <input type="number" inputmode="decimal" step="0.001" id="in-${f.k}-${item.id}" placeholder="+ кг/шт" onkeydown="if(event.key==='Enter') addWeight('${item.id}','${f.k}')">
                                <button class="btn-plus" onclick="addWeight('${item.id}','${f.k}')">+</button>
                            </div>
                        </div>
                    `).join('')}
                    <div class="card-actions">
                        <button class="btn-send" onclick="sendToTG('${item.id}', this)">ВІДПРАВИТИ</button>
                        <button class="btn-delete-full" onclick="quickDelete('${item.id}')">🗑</button>
                    </div>
                </div>
            </div>`;
    }).join('') || '<div style="color:white;text-align:center;grid-column:1/-1;padding:40px;">Оберіть тип зверху</div>';
}

window.askDeletePassword = (id) => { pendingDeleteId = id; document.getElementById('deleteModal').classList.add('open'); };
window.closeModal = () => { document.getElementById('deleteModal').classList.remove('open'); renderCards(cachedData); };
window.confirmDelete = () => {
    if (document.getElementById('modalPassInput').value === _AP) {
        firebase.database().ref('meat_batches/' + pendingDeleteId).remove();
        document.getElementById('modalPassInput').value = ''; closeModal();
    } else { alert("Пароль!"); }
};
window.quickDelete = (id) => { pendingQuickDeleteId = id; document.getElementById('confirmModal').classList.add('open'); };
window.closeConfirmModal = () => { document.getElementById('confirmModal').classList.remove('open'); renderCards(cachedData); };
window.doQuickDelete = () => { firebase.database().ref('meat_batches/' + pendingQuickDeleteId).remove(); closeConfirmModal(); };

// UPDATED AUTH LOGIC
const PASS_ENTRY = "2024";
let currentPin = "";

function pressNum(num) {
    const errorEl = document.getElementById('auth-error');
    errorEl.classList.remove('show');

    if (num === 'back') {
        currentPin = currentPin.slice(0, -1);
    } else if (currentPin.length < 4) {
        currentPin += num;
    }
    
    updatePinDisplay();

    if (currentPin.length === 4) {
        setTimeout(checkAuth, 100);
    }
}

function updatePinDisplay() {
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach((dot, index) => {
        dot.classList.toggle('active', index < currentPin.length);
    });
}

function checkAuth() {
    if (currentPin === PASS_ENTRY) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
    } else {
        const errorEl = document.getElementById('auth-error');
        errorEl.classList.add('show');
        currentPin = "";
        setTimeout(updatePinDisplay, 500);
    }
}
</script>
</div>
</body>
</html>
